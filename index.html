<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💕 Nosso Contador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --rose:         #FF8FAB;
      --blush:        #FFC2D4;
      --deep-rose:    #FF4D6D;
      --lavender:     #CDB4DB;
      --lavender-lt:  #E8D5F5;
      --cream:        #FFF0F3;
      --text-dark:    #4A2040;
      --text-soft:    #9B6080;
      --glass-bg:     rgba(255, 255, 255, 0.38);
      --glass-border: rgba(255, 255, 255, 0.68);
      --glass-blur:   blur(24px);
      --shadow-card:  0 24px 64px rgba(205, 100, 140, 0.22), 0 8px 24px rgba(255, 143, 171, 0.18);
      --shadow-box:   0 4px 16px rgba(255, 100, 130, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.9);
      --r-lg:   28px;
      --r-md:   18px;
      --r-pill: 100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      overflow-x: hidden;
      position: relative;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-color: #FFE8EF;
      background-image:
        radial-gradient(ellipse 90% 80% at 12%  8%,  rgba(255, 194, 212, 0.88) 0%, transparent 55%),
        radial-gradient(ellipse 70% 70% at 88%  14%, rgba(205, 180, 219, 0.72) 0%, transparent 55%),
        radial-gradient(ellipse 80% 60% at 50%  96%, rgba(255, 143, 171, 0.62) 0%, transparent 55%),
        radial-gradient(ellipse 60% 80% at 94%  74%, rgba(255, 220, 235, 0.75) 0%, transparent 50%),
        radial-gradient(ellipse 65% 75% at  6%  82%, rgba(232, 213, 245, 0.66) 0%, transparent 55%);
    }

    .hearts {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .h {
      position: absolute;
      font-size: var(--s, 1.4rem);
      opacity: 0;
      animation: rise var(--d, 10s) var(--del, 0s) ease-in-out infinite;
      filter: drop-shadow(0 2px 6px rgba(255, 80, 120, 0.22));
    }

    @keyframes rise {
      0%   { opacity: 0;    transform: translateY(108vh) rotate(var(--r, 0deg)) scale(0.55); }
      12%  { opacity: 0.82; }
      88%  { opacity: 0.5; }
      100% { opacity: 0;    transform: translateY(-12vh)  rotate(calc(var(--r, 0deg) + 30deg)) scale(1.08); }
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1.5px solid var(--glass-border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-card);
      padding: clamp(1.75rem, 5vw, 2.8rem) clamp(1.4rem, 5vw, 2.6rem);
      max-width: 510px;
      width: 100%;
      text-align: center;
      animation: appear 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 14%; right: 14%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--rose), var(--lavender), var(--rose), transparent);
      border-radius: var(--r-pill);
    }

    @keyframes appear {
      from { opacity: 0; transform: scale(0.87) translateY(26px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    header { margin-bottom: 0.2rem; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: linear-gradient(135deg, var(--rose), var(--lavender));
      color: #fff;
      font-size: 0.63rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 0.28em 0.95em;
      border-radius: var(--r-pill);
      margin-bottom: 0.85rem;
      box-shadow: 0 4px 12px rgba(255, 100, 130, 0.3);
    }

    h1.title {
      font-size: clamp(1.3rem, 4.5vw, 1.95rem);
      font-weight: 900;
      color: var(--text-dark);
      line-height: 1.15;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--text-soft);
      font-weight: 600;
    }

    .chars {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      margin: 1.55rem 0 1.45rem;
    }

    .char {
      font-size: clamp(3.2rem, 10vw, 4.8rem);
      display: inline-block;
      filter: drop-shadow(0 8px 18px rgba(255, 80, 110, 0.28));
      animation: bob 3.2s ease-in-out infinite;
    }

    .char--raccoon { animation-delay: 0.65s; }

    .heart-mid {
      font-size: clamp(1.35rem, 4.5vw, 2rem);
      display: inline-block;
      animation: throb 1.6s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50%       { transform: translateY(-12px) rotate(4deg); }
    }

    @keyframes throb {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.35); filter: drop-shadow(0 0 10px rgba(255, 50, 90, 0.5)); }
    }

    .counter-section { margin-bottom: 1.4rem; }

    .counter-eyebrow {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-soft);
      margin-bottom: 0.8rem;
    }

    .boxes {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .box {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.93), rgba(255, 240, 245, 0.76));
      border: 1.5px solid rgba(255, 255, 255, 0.86);
      border-radius: var(--r-md);
      padding: 0.55rem 0.72rem;
      min-width: clamp(60px, 17vw, 82px);
      box-shadow: var(--shadow-box);
      transition: transform 0.28s ease;
    }

    .box:hover { transform: translateY(-3px) scale(1.02); }

    .num {
      display: block;
      font-size: clamp(1.85rem, 5.5vw, 2.9rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--deep-rose) 0%, var(--lavender) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .lbl {
      font-size: clamp(0.57rem, 1.6vw, 0.69rem);
      font-weight: 800;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .sep {
      font-size: 1.65rem;
      font-weight: 900;
      color: var(--rose);
      opacity: 0.5;
      margin-bottom: 0.55rem;
      user-select: none;
    }

    @keyframes pop {
      0%   { transform: scale(0.6); opacity: 0.45; }
      100% { transform: scale(1);   opacity: 1; }
    }
    .num.pop { animation: pop 0.42s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .phrase {
      background: linear-gradient(135deg, rgba(255, 194, 212, 0.22), rgba(205, 180, 219, 0.22));
      border: 1px solid rgba(255, 183, 197, 0.42);
      border-radius: var(--r-md);
      padding: 0.9rem 1.1rem;
      margin-bottom: 1.15rem;
    }

    .phrase p {
      font-size: clamp(0.82rem, 2.4vw, 0.96rem);
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.58;
    }

    .hi {
      color: var(--deep-rose);
      font-weight: 900;
    }

    .since {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.71rem;
      font-weight: 700;
      color: var(--text-soft);
      margin-bottom: 1.4rem;
    }

    .since::before,
    .since::after {
      content: '';
      flex: 1;
      max-width: 55px;
      height: 1px;
    }

    .since::before { background: linear-gradient(90deg,  transparent, rgba(255, 100, 130, 0.28)); }
    .since::after  { background: linear-gradient(270deg, transparent, rgba(255, 100, 130, 0.28)); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.72rem 1.55rem;
      border-radius: var(--r-pill);
      border: 1.5px solid rgba(255, 143, 171, 0.46);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.54), rgba(255, 240, 246, 0.42));
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--text-soft);
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(255, 100, 130, 0.1);
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      letter-spacing: 0.01em;
    }

    .btn:hover {
      background: linear-gradient(135deg, rgba(255, 77, 109, 0.1), rgba(205, 180, 219, 0.22));
      border-color: var(--rose);
      color: var(--deep-rose);
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(255, 100, 130, 0.22);
    }

    .btn:active { transform: scale(0.97) translateY(0); }

    .btn:focus-visible {
      outline: 2px solid var(--deep-rose);
      outline-offset: 3px;
    }

    /* ── Status indicator (online/offline) ── */
    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--text-soft);
      margin-bottom: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ccc;
      transition: background 0.4s;
    }

    .dot.connected    { background: #66bb6a; box-shadow: 0 0 0 3px rgba(102,187,106,0.25); }
    .dot.connecting   { background: #ffa726; animation: pulse-dot 1s ease-in-out infinite; }
    .dot.disconnected { background: #ef5350; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    @media (max-width: 380px) {
      .card  { padding: 1.5rem 1.1rem; }
      .boxes { gap: 0.35rem; }
      .sep   { font-size: 1.3rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .char, .heart-mid, .h, .card { animation: none !important; }
      .num.pop                      { animation: none !important; }
      .dot.connecting               { animation: none !important; }
    }
  </style>
</head>
<body>

  <div class="bg" aria-hidden="true"></div>
  <div class="hearts" aria-hidden="true" id="heartsWrap"></div>

  <main class="card" role="main">

    <header>
      <div class="badge" aria-hidden="true">✨ Nosso amor ✨</div>
      <h1 class="title">Contador do Amor 💕</h1>
      <p class="subtitle">Eu te amo minha guaxinimzinha</p>
    </header>

    <div class="chars" aria-label="Panda e Guaxinim apaixonados">
      <span class="char char--panda"   role="img" aria-label="Panda">🐼</span>
      <span class="heart-mid"          role="img" aria-label="Coração">❤️</span>
      <span class="char char--raccoon" role="img" aria-label="Guaxinim">🦝</span>
    </div>

    <!-- Indicador de sincronização -->
    <div class="status-dot" id="statusEl" aria-live="polite">
      <span class="dot connecting" id="dotEl"></span>
      <span id="statusText">Conectando...</span>
    </div>

    <section class="counter-section" aria-label="Tempo juntos sem erros">
      <p class="counter-eyebrow" id="eyebrowDays">Estamos acertando há 0 dias consecutivos.</p>

      <div class="boxes" role="timer" aria-live="polite" aria-atomic="true">
        <div class="unit">
          <div class="box"><span class="num" id="nDays">0</span></div>
          <span class="lbl" id="lDays">dias</span>
        </div>
        <span class="sep" aria-hidden="true">·</span>
        <div class="unit">
          <div class="box"><span class="num" id="nHours">00</span></div>
          <span class="lbl" id="lHours">horas</span>
        </div>
        <span class="sep" aria-hidden="true">·</span>
        <div class="unit">
          <div class="box"><span class="num" id="nMins">00</span></div>
          <span class="lbl" id="lMins">minutos</span>
        </div>
      </div>
    </section>

    <div class="phrase" role="status" aria-live="polite">
      <p id="phraseEl">Conectando ao banco de dados...</p>
    </div>

    <p class="since" id="sinceEl">Desde —</p>

    <button class="btn" id="btnReset" type="button"
            aria-label="Zerar contador — clique se aconteceu um erro">
      Nãooo, aconteceu um erro 💔
    </button>

  </main>

  <!-- ══════════════════════════════════════════════════════════
       Firebase SDK (v9 compat — funciona sem bundler/build)
  ══════════════════════════════════════════════════════════ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script>
    /* ══════════════════════════════════════════════════════════
       ⚠️  SUBSTITUA PELO SEU firebaseConfig
       (Copie do console Firebase → Configurações do projeto → Seus apps)
    ══════════════════════════════════════════════════════════ */
  const firebaseConfig = {

  apiKey: "AIzaSyCTDKKBRDHW1WlvZp4Y9B8Qk0iUymJkKFY",

  authDomain: "nosso-contador52.firebaseapp.com",

  databaseURL: "https://nosso-contador52-default-rtdb.firebaseio.com",

  projectId: "nosso-contador52",

  storageBucket: "nosso-contador52.firebasestorage.app",

  messagingSenderId: "612143751526",

  appId: "1:612143751526:web:182a0d950a5b91b0d328a7"

};

    /* ──────────────────────────────────────────────────────────
       INICIALIZAR FIREBASE
    ────────────────────────────────────────────────────────── */
    firebase.initializeApp(firebaseConfig);
    const db       = firebase.database();
    const ref      = db.ref('contador/inicio'); // nó no Realtime Database
    const connRef  = db.ref('.info/connected'); // nó especial de conexão

    /* ──────────────────────────────────────────────────────────
       REFERÊNCIAS DO DOM
    ────────────────────────────────────────────────────────── */
    const nDays      = document.getElementById('nDays');
    const nHours     = document.getElementById('nHours');
    const nMins      = document.getElementById('nMins');
    const lDays      = document.getElementById('lDays');
    const lHours     = document.getElementById('lHours');
    const lMins      = document.getElementById('lMins');
    const phraseEl   = document.getElementById('phraseEl');
    const sinceEl    = document.getElementById('sinceEl');
    const btnReset   = document.getElementById('btnReset');
    const eyebrowEl  = document.getElementById('eyebrowDays');
    const dotEl      = document.getElementById('dotEl');
    const statusText = document.getElementById('statusText');

    /* ──────────────────────────────────────────────────────────
       UTILITÁRIOS
    ────────────────────────────────────────────────────────── */
    const plural = (n, s, p) => n === 1 ? s : p;

    function fmtDate(iso) {
      const d  = new Date(iso);
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      return `${dd}/${mm}/${d.getFullYear()}`;
    }

    function calcDiff(iso) {
      const elapsed = Math.max(0, Date.now() - new Date(iso).getTime());
      return {
        days:  Math.floor(elapsed / 86_400_000),
        hours: Math.floor(elapsed / 3_600_000) % 24,
        mins:  Math.floor(elapsed / 60_000)    % 60,
      };
    }

    function animNum(el, val) {
      const txt = String(val);
      if (el.textContent === txt) return;
      el.textContent = txt;
      el.classList.remove('pop');
      void el.offsetWidth;
      el.classList.add('pop');
    }

    /* ──────────────────────────────────────────────────────────
       RENDERIZAR O CONTADOR
    ────────────────────────────────────────────────────────── */
    let currentIso = null; // guarda o ISO atual para o setInterval

    function render(iso) {
      currentIso = iso;
      const { days, hours, mins } = calcDiff(iso);

      animNum(nDays,  days);
      animNum(nHours, String(hours).padStart(2, '0'));
      animNum(nMins,  String(mins).padStart(2, '0'));

      lDays.textContent  = plural(days,  'dia',    'dias');
      lHours.textContent = plural(hours, 'hora',   'horas');
      lMins.textContent  = plural(mins,  'minuto', 'minutos');

      eyebrowEl.textContent =
        `Estamos acertando há ${days} ${plural(days, 'dia', 'dias')} consecutivos.`;

      const dStr = `${days} ${plural(days,  'dia',    'dias')}`;
      const hStr = `${hours} ${plural(hours, 'hora',   'horas')}`;
      const mStr = `${mins} ${plural(mins,  'minuto', 'minutos')}`;

      phraseEl.innerHTML =
        `Estamos há <span class="hi">${dStr}</span>, ` +
        `<span class="hi">${hStr}</span> e ` +
        `<span class="hi">${mStr}</span> sem erros 💕`;

      sinceEl.textContent = `Desde ${fmtDate(iso)}`;
    }

    /* ──────────────────────────────────────────────────────────
       ESCUTAR MUDANÇAS EM TEMPO REAL (onValue)
       Qualquer dispositivo que salvar uma nova data no Firebase
       vai disparar esse callback em TODOS os clientes conectados.
    ────────────────────────────────────────────────────────── */
    ref.on('value', (snapshot) => {
      const iso = snapshot.val();

      if (!iso) {
        // Primeiro acesso: define a data padrão no banco
        const defaultIso = '2026-06-02T00:00:00';
        ref.set(defaultIso);
        return; // o .on() vai disparar novamente com o valor salvo
      }

      render(iso);
    });

    /* ──────────────────────────────────────────────────────────
       INDICADOR DE CONEXÃO
       O nó especial .info/connected é true quando online
       e false quando offline — atualiza em tempo real.
    ────────────────────────────────────────────────────────── */
    connRef.on('value', (snap) => {
      const online = snap.val();
      dotEl.className    = `dot ${online ? 'connected' : 'disconnected'}`;
      statusText.textContent = online ? 'Sincronizado ✓' : 'Sem conexão';
    });

    /* ──────────────────────────────────────────────────────────
       RESET — SALVA A NOVA DATA NO FIREBASE
       Todos os outros dispositivos receberão a atualização
       automaticamente via o listener .on('value') acima.
    ────────────────────────────────────────────────────────── */
    btnReset.addEventListener('click', () => {
      if (!confirm('Tem certeza que deseja zerar nosso contador? 🥺')) return;
      const iso = new Date().toISOString();
      ref.set(iso); // propaga para todos os clientes instantaneamente
    });

    /* ──────────────────────────────────────────────────────────
       TICK LOCAL — atualiza horas/minutos a cada minuto
       (o Firebase só precisa ser lido quando a data muda;
        o tick local mantém os números vivos entre as mudanças)
    ────────────────────────────────────────────────────────── */
    setInterval(() => {
      if (currentIso) render(currentIso);
    }, 60_000);

    /* ──────────────────────────────────────────────────────────
       CORAÇÕES FLUTUANTES
    ────────────────────────────────────────────────────────── */
    (function spawnHearts() {
      const wrap   = document.getElementById('heartsWrap');
      const emojis = ['❤️','🩷','💕','💗','💖','💝','🌸','🤍','💞'];
      for (let i = 0; i < 22; i++) {
        const el = document.createElement('span');
        el.className   = 'h';
        el.textContent = emojis[i % emojis.length];
        el.style.cssText = [
          `left:${(Math.random() * 96).toFixed(1)}%`,
          `--s:${(0.85 + Math.random() * 1.55).toFixed(2)}rem`,
          `--d:${(8    + Math.random() * 9).toFixed(1)}s`,
          `--del:${(Math.random() * 14).toFixed(1)}s`,
          `--r:${(Math.random() * 40 - 20).toFixed(0)}deg`,
        ].join(';');
        wrap.appendChild(el);
      }
    })();
  </script>

</body>
</html>
